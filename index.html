<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PeerSync Web</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #0a0a0a; --surface: #111; --border: #1a3a2a; --text: #e0e0e0; --accent: #00d4aa; --accent2: #0f3460; --msg-bg: #0d1a14; --input-bg: #0d0d0d; --hover: #1a2a22; --shadow: rgba(0,212,170,.15); --scrollbar: #1a3a2a; --font: 'Consolas','Courier New',monospace; --radius: 8px; }
.light { --bg: #f0f4f8; --surface: #ffffff; --border: #b0c4de; --text: #1a1a2e; --accent: #1976D2; --accent2: #e3f2fd; --msg-bg: #f5f8fc; --input-bg: #ffffff; --hover: #e8eef4; --shadow: rgba(25,118,210,.1); --scrollbar: #b0c4de; }
body { font-family: var(--font); background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; transition: .3s; }
#login { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 12px; padding: 20px; }
#login h1 { font-size: 24px; color: var(--accent); margin-bottom: 10px; }
#login input { background: var(--input-bg); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: var(--radius); font-family: var(--font); width: 260px; font-size: 14px; outline: none; }
#login input:focus { border-color: var(--accent); box-shadow: 0 0 8px var(--shadow); }
#login button { background: var(--accent); color: #111; border: none; padding: 10px 30px; border-radius: var(--radius); font-family: var(--font); font-weight: bold; font-size: 14px; cursor: pointer; transition: .2s; }
#login button:hover { opacity: .85; transform: scale(1.02); }
#login .error { color: #ff4444; font-size: 13px; }
#chat { display: none; flex: 1; flex-direction: column; }
header { display: flex; align-items: center; padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--border); gap: 12px; }
header h1 { font-size: 16px; color: var(--accent); flex: 1; }
header .pseudo { font-size: 13px; opacity: .7; }
header .role { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: var(--accent2); color: var(--accent); }
header #theme-btn, header #logout-btn { background: none; border: 1px solid var(--border); color: var(--text); padding: 4px 12px; border-radius: var(--radius); cursor: pointer; font-size: 12px; font-family: var(--font); }
header #theme-btn:hover, header #logout-btn:hover { background: var(--hover); }
#main { display: flex; flex: 1; overflow: hidden; }
#sidebar { width: 200px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
#sidebar h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; padding: 12px 14px 8px; opacity: .5; display: flex; justify-content: space-between; }
#sidebar h3 button { background: none; border: 1px solid var(--border); color: var(--accent); padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; font-family: var(--font); }
#channels { list-style: none; overflow-y: auto; flex: 1; }
#channels li { padding: 8px 14px; cursor: pointer; font-size: 13px; border-left: 3px solid transparent; display: flex; justify-content: space-between; align-items: center; transition: .15s; }
#channels li:hover { background: var(--hover); }
#channels li.active { border-left-color: var(--accent); background: var(--hover); }
#channels li .del { color: #ff4444; cursor: pointer; opacity: 0; font-size: 12px; padding: 0 4px; }
#channels li:hover .del { opacity: .6; }
#channels li .del:hover { opacity: 1; }
#content { flex: 1; display: flex; flex-direction: column; }
#msgs { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 4px; }
#msgs .msg { padding: 8px 12px; border-radius: var(--radius); background: var(--msg-bg); font-size: 13px; line-height: 1.5; }
#msgs .msg .head { font-size: 11px; color: var(--accent); margin-bottom: 2px; }
#msgs .msg .head .time { opacity: .5; margin-left: 8px; }
#msgs .msg .head .chan-tag { font-size: 10px; padding: 1px 6px; border-radius: 4px; background: var(--accent2); margin-left: 6px; }
#input-area { display: flex; padding: 10px 16px; background: var(--surface); border-top: 1px solid var(--border); gap: 8px; }
#input-area input { flex: 1; background: var(--input-bg); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: var(--radius); font-family: var(--font); font-size: 13px; outline: none; }
#input-area input:focus { border-color: var(--accent); }
#input-area button { background: var(--accent); color: #111; border: none; padding: 10px 20px; border-radius: var(--radius); font-weight: bold; font-size: 13px; cursor: pointer; font-family: var(--font); transition: .2s; }
#input-area button:hover { opacity: .85; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }
@media (max-width: 600px) { #sidebar { width: 140px; } #login input { width: 200px; } }
</style>
</head>
<body>
<div id="login">
  <h1>◆ PeerSync</h1>
  <input id="user-input" placeholder="Pseudo" autocomplete="off">
  <input id="pass-input" type="password" placeholder="Mot de passe" autocomplete="off">
  <button id="login-btn">CONNEXION</button>
  <div class="error" id="login-error"></div>
</div>
<div id="chat">
  <header>
    <h1>◆ PeerSync</h1>
    <span class="pseudo" id="disp-pseudo"></span>
    <span class="role" id="disp-role"></span>
    <button id="theme-btn">◐ Theme</button>
    <button id="logout-btn">✕ Quitter</button>
  </header>
  <div id="main">
    <div id="sidebar">
      <h3>Salons <button id="add-chan-btn">+</button></h3>
      <ul id="channels"></ul>
    </div>
    <div id="content">
      <div id="msgs"></div>
      <div id="input-area">
        <input id="msg-input" placeholder="Message..." autocomplete="off">
        <button id="send-btn">Envoyer</button>
      </div>
    </div>
  </div>
</div>
<script>
const SERVER = 'https://serverirc2-production.up.railway.app'
let user = '', passwd = '', role = '', currentChan = 'general', after = 0, isLight = false

const $ = s => document.querySelector(s)
const $$ = s => document.querySelectorAll(s)

$('#login-btn').onclick = login
$('#logout-btn').onclick = logout
$('#theme-btn').onclick = toggleTheme
$('#send-btn').onclick = sendMsg
$('#msg-input').onkeydown = e => { if(e.key==='Enter') sendMsg() }
$('#add-chan-btn').onclick = createChan

async function api(path, body) {
  const r = await fetch(SERVER + path, { method: body?'POST':'GET', headers:{'Content-Type':'application/json'}, body: body?JSON.stringify(body):undefined })
  return r.json()
}

async function login() {
  user = $('#user-input').value.trim().toLowerCase()
  passwd = $('#pass-input').value
  if(!user||!passwd) return $('#login-error').textContent=' remplis les champs'
  const r = await api('/api/login', {user, pass:passwd})
  if(!r.ok) return $('#login-error').textContent=' mauvais identifiants'
  role = r.role
  $('#login').style.display='none'
  $('#chat').style.display='flex'
  $('#disp-pseudo').textContent=user
  $('#disp-role').textContent=role==='admin'?'👑 Admin':'💬 Membre'
  if(role!=='admin') $('#add-chan-btn').style.display='none'
  loadChannels()
  pollMsgs()
}

function logout() { location.reload() }

function toggleTheme() {
  isLight = !isLight
  document.body.classList.toggle('light', isLight)
  $('#theme-btn').textContent = isLight ? '◑ Theme' : '◐ Theme'
}

async function loadChannels() {
  const ch = await api('/api/channels')
  const ul = $('#channels')
  ul.innerHTML = ''
  ch.forEach(c => {
    const li = document.createElement('li')
    li.textContent = '# ' + c
    li.dataset.chan = c
    if(c===currentChan) li.classList.add('active')
    li.onclick = () => switchChan(c)
    if(role==='admin' && c!=='general') {
      const d = document.createElement('span')
      d.textContent = '✕'
      d.className = 'del'
      d.onclick = e => { e.stopPropagation(); deleteChan(c) }
      li.appendChild(d)
    }
    ul.appendChild(li)
  })
}

async function createChan() {
  const name = prompt('Nom du nouveau salon:')
  if(!name) return
  const r = await api('/api/channels/create', {user, pass:passwd, chan:name})
  if(r.ok) { loadChannels(); switchChan(name) }
  else alert(r.error||'erreur')
}

async function deleteChan(c) {
  if(!confirm(`Supprimer #${c} ?`)) return
  const r = await api('/api/channels/delete', {user, pass:passwd, chan:c})
  if(r.ok) { if(currentChan===c) switchChan('general'); loadChannels() }
  else alert(r.error||'erreur')
}

function switchChan(c) {
  currentChan = c
  after = 0
  $$('#channels li').forEach(l => l.classList.toggle('active', l.dataset.chan===c))
  $('#msgs').innerHTML = ''
  $('#msg-input').focus()
}

async function sendMsg() {
  const text = $('#msg-input').value.trim()
  if(!text) return
  $('#msg-input').value = ''
  await api('/api/send', {user, pass:passwd, text, chan:currentChan})
}

async function loadMsgs() {
  const msgs = await api('/api/msgs?after=' + after)
  const div = $('#msgs')
  msgs.forEach(m => {
    if(m.id>after) after = m.id
    if(m.chan!==currentChan) return
    const el = document.createElement('div')
    el.className = 'msg'
    const h = new Date(m.id).toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'})
    el.innerHTML = `<div class="head">${m.user} <span class="time">${h}</span></div>${m.text}`
    div.appendChild(el)
  })
  if(msgs.length) div.scrollTop = div.scrollHeight
}

function pollMsgs() { setInterval(loadMsgs, 1000) }

$('#user-input').onkeydown = e => { if(e.key==='Enter') login() }
$('#pass-input').onkeydown = e => { if(e.key==='Enter') login() }
</script>
</body>
</html>
